<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spellbook — exploitability validation</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --border:#2b333d; --fg:#e6edf3; --muted:#8b949e;
    --accent:#a371f7; --ok:#3fb950; --bad:#f85149; --warn:#d29922;
  }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;
         background:var(--bg); color:var(--fg); }
  header { padding:16px 24px; border-bottom:1px solid var(--border); display:flex;
           align-items:baseline; gap:12px; }
  header h1 { margin:0; font-size:18px; } header .sub { color:var(--muted); }
  main { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:16px 24px; max-width:1200px; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:16px; }
  .panel h2 { margin:0 0 12px; font-size:13px; text-transform:uppercase;
              letter-spacing:.08em; color:var(--muted); }
  label { display:block; margin:8px 0 2px; color:var(--muted); font-size:12px; }
  input, select { width:100%; padding:6px 8px; background:var(--bg); color:var(--fg);
                  border:1px solid var(--border); border-radius:6px; font:inherit; }
  button { margin-top:12px; padding:7px 14px; background:var(--accent); color:#fff; border:0;
           border-radius:6px; cursor:pointer; font:inherit; }
  button.ghost { background:transparent; border:1px solid var(--border); color:var(--fg); margin:0; }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .runs { grid-column:1 / -1; }
  table { width:100%; border-collapse:collapse; }
  th, td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--border); font-size:13px; }
  th { color:var(--muted); font-weight:normal; }
  .badge { padding:1px 8px; border-radius:999px; font-size:12px; }
  .EXPLOITABLE { background:rgba(248,81,73,.15); color:var(--bad); }
  .NOT_EXPLOITABLE { background:rgba(63,185,80,.15); color:var(--ok); }
  .INCONCLUSIVE, .denied { background:rgba(210,153,34,.15); color:var(--warn); }
  .running, .pending { color:var(--muted); }
  .detail { grid-column:1 / -1; }
  pre { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:12px;
        overflow:auto; font-size:12px; }
  .err { color:var(--bad); font-size:12px; min-height:16px; }
  .hint { color:var(--muted); font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>🪄 Spellbook</h1>
  <span class="sub">Wiz finding exploitability validation — external (shields up) &amp; internal (shields down)</span>
</header>

<main>
  <section class="panel">
    <h2>Ingest finding</h2>
    <div class="row">
      <div><label>ID</label><input id="f_id" value="F-1"></div>
      <div><label>Severity</label><input id="f_sev" value="CRITICAL"></div>
    </div>
    <label>Title</label><input id="f_title" value="Public admin panel, no auth">
    <div class="row">
      <div><label>Vector</label>
        <select id="f_vector">
          <option>exposed_service</option><option>cve</option>
          <option>misconfig</option><option>iam</option>
        </select></div>
      <div><label>Host / target</label><input id="f_host" value="api.acme.com"></div>
    </div>
    <div class="row">
      <div><label>Asset id</label><input id="f_asset" value="gcp/vm/web-1"></div>
      <div><label>Project</label><input id="f_project" value="prod"></div>
    </div>
    <button onclick="ingest()">Ingest</button>
    <div class="err" id="f_err"></div>
  </section>

  <section class="panel">
    <h2>Start validation run</h2>
    <label>Finding id</label><input id="r_finding" value="F-1">
    <div class="row">
      <div><label>Posture</label>
        <select id="r_posture">
          <option value="external">external — shields up</option>
          <option value="internal">internal — shields down</option>
        </select></div>
      <div><label>Tier</label>
        <select id="r_tier">
          <option value="passive">passive</option>
          <option value="active_noninvasive" selected>active_noninvasive</option>
          <option value="active_invasive">active_invasive (full exploit)</option>
        </select></div>
    </div>
    <label>Authorization id <span class="hint">(required for full exploit)</span></label>
    <input id="r_auth" placeholder="A-1 (optional)">
    <button onclick="startRun()">Launch</button>
    <div class="err" id="r_err"></div>

    <h2 style="margin-top:20px">Authorize full-exploit target</h2>
    <div class="row">
      <div><label>Auth id</label><input id="a_id" value="A-1"></div>
      <div><label>Target (host/CIDR)</label><input id="a_target" value="acme.com"></div>
    </div>
    <div class="row">
      <div><label>Authorized by</label><input id="a_by" value="andy"></div>
      <div><label>Expires (ISO)</label><input id="a_exp"></div>
    </div>
    <label>Blast-radius note</label><input id="a_note" value="isolated lab host, snapshot taken">
    <button class="ghost" onclick="authorize()">Create authorization</button>
    <div class="err" id="a_err"></div>
  </section>

  <section class="panel runs">
    <h2>Runs <button class="ghost" onclick="loadRuns()">refresh</button></h2>
    <table>
      <thead><tr><th>id</th><th>finding</th><th>posture</th><th>tier</th><th>status</th><th>verdict</th><th>conf</th><th></th></tr></thead>
      <tbody id="runs"></tbody>
    </table>
  </section>

  <section class="panel detail" id="detailPanel" style="display:none">
    <h2>Run detail <button class="ghost" onclick="hideDetail()">close</button></h2>
    <pre id="detail"></pre>
  </section>
</main>

<script>
const $ = id => document.getElementById(id);
async function api(method, path, body) {
  const opts = { method };
  if (body !== undefined && body !== null) {
    opts.headers = { 'content-type': 'application/json' };
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  const ct = r.headers.get('content-type') || '';
  const data = ct.includes('application/json') ? await r.json().catch(() => ({})) : {};
  if (!r.ok) throw new Error(data.detail || r.status);
  return data;
}
// default expiry: +2h
$('a_exp').value = new Date(Date.now()+2*3600e3).toISOString();

async function ingest() {
  $('f_err').textContent = '';
  try {
    await api('POST','/findings',{ id:$('f_id').value, severity:$('f_sev').value,
      title:$('f_title').value, vector:$('f_vector').value, host:$('f_host').value,
      asset_id:$('f_asset').value, project:$('f_project').value });
    $('r_finding').value = $('f_id').value;
  } catch(e){ $('f_err').textContent = e.message; }
}
async function authorize() {
  $('a_err').textContent = '';
  try {
    await api('POST','/authorizations',{ id:$('a_id').value, target:$('a_target').value,
      max_tier:'active_invasive', authorized_by:$('a_by').value,
      blast_radius_note:$('a_note').value, expires_at:$('a_exp').value });
    $('r_auth').value = $('a_id').value;
  } catch(e){ $('a_err').textContent = e.message; }
}
async function startRun() {
  $('r_err').textContent = '';
  try {
    const run = await api('POST','/runs',{ finding_id:$('r_finding').value,
      posture:$('r_posture').value, tier:$('r_tier').value,
      authorization_id:$('r_auth').value || null });
    await loadRuns();
    if (run.status === 'running') { await api('POST',`/runs/${run.id}/complete`); await loadRuns(); }
  } catch(e){ $('r_err').textContent = e.message; }
}
// Build cells with textContent only — never innerHTML — so finding ids, verdicts,
// and other server/agent-supplied strings can't inject markup or script.
function td(text) { const el = document.createElement('td'); el.textContent = text; return el; }
const VERDICT_CLASS = { EXPLOITABLE:'EXPLOITABLE', NOT_EXPLOITABLE:'NOT_EXPLOITABLE', INCONCLUSIVE:'INCONCLUSIVE' };
const STATUS_CLASS = { running:'running', pending:'pending', denied:'denied' };

async function loadRuns() {
  const runs = await api('GET','/runs');
  const tbody = $('runs');
  tbody.replaceChildren();
  for (const r of runs) {
    const tr = document.createElement('tr');
    tr.append(td(r.id.slice(0,8)), td(r.finding_id), td(r.posture), td(r.tier));

    const stTd = td(r.status);
    if (STATUS_CLASS[r.status]) stTd.className = STATUS_CLASS[r.status];  // whitelisted class only
    tr.append(stTd);

    const vTd = document.createElement('td');
    if (r.verdict) {
      const span = document.createElement('span');
      span.className = 'badge ' + (VERDICT_CLASS[r.verdict] || 'INCONCLUSIVE');
      span.textContent = r.verdict;
      vTd.append(span);
    } else { vTd.textContent = '—'; }
    tr.append(vTd, td(r.confidence ?? '—'));

    const btnTd = document.createElement('td');
    const btn = document.createElement('button');
    btn.className = 'ghost';
    btn.textContent = 'view';
    btn.addEventListener('click', () => showDetail(r.id));  // id captured in closure, never interpolated
    btnTd.append(btn);
    tr.append(btnTd);

    tbody.append(tr);
  }
}
async function showDetail(id) {
  const r = await api('GET',`/runs/${id}`);
  $('detail').textContent = JSON.stringify(r, null, 2);
  $('detailPanel').style.display = 'block';
}
function hideDetail(){ $('detailPanel').style.display='none'; }
loadRuns();
</script>
</body>
</html>
