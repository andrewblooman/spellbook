# Spellbook stack: Postgres + control plane (FastAPI + SPA) + the two agent-workers.
#
#   docker compose up --build      ->  http://localhost:8000
#
# Live agent runs need an Anthropic key (ANTHROPIC_API_KEY, e.g. via .env). Each
# worker runs the Claude Agent SDK loop and claims dispatched runs for its posture
# from the control plane over the internal API. Without a key the stack still
# ingests, seeds, and serves the UI; workers idle-poll until a key + a run exist.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spellbook
      POSTGRES_PASSWORD: spellbook
      POSTGRES_DB: spellbook
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spellbook -d spellbook"]
      interval: 5s
      timeout: 3s
      retries: 10

  control:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      SPELLBOOK_DATABASE_URL: postgresql+psycopg://spellbook:spellbook@db:5432/spellbook
      SPELLBOOK_SEED: "1"
      SPELLBOOK_SCOPE: "example.com,shop.example.com,10.4.0.0/16"
      SPELLBOOK_WORKER_TOKEN: "${SPELLBOOK_WORKER_TOKEN:-dev-token}"

  worker-external:
    build:
      context: .
      target: worker
    depends_on: [control]
    environment:
      SPELLBOOK_POSTURE: external
      SPELLBOOK_CONTROL_URL: http://control:8000
      SPELLBOOK_WORKER_TOKEN: "${SPELLBOOK_WORKER_TOKEN:-dev-token}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"

  worker-internal:
    build:
      context: .
      target: worker
    depends_on: [control]
    environment:
      SPELLBOOK_POSTURE: internal
      SPELLBOOK_CONTROL_URL: http://control:8000
      SPELLBOOK_WORKER_TOKEN: "${SPELLBOOK_WORKER_TOKEN:-dev-token}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"

volumes:
  pgdata:
